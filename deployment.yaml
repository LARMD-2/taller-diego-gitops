apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  annotations:
    argocd.argoproj.io/sync-wave: "1"  # Primera ola: La API se levanta primero
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hexagonal-api
  template:
    metadata:
      labels:
        app: hexagonal-api
    spec:
      containers:
      - name: adapter-rest
        image: larmd/taller-backend:v1.1.6
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: hexagonal-config
        env:
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector.monitoring.svc.cluster.local:4317"
        - name: OTEL_SERVICE_NAME
          value: "taller-diego-api"
        # Validación de Salud (Punto 4)
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  annotations:
    argocd.argoproj.io/sync-wave: "2"  # Segunda ola: El frontend espera a que la API esté lista
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hexagonal-frontend
  template:
    metadata:
      labels:
        app: hexagonal-frontend
    spec:
      containers:
      - name: web-ui
        image: larmd/taller-frontend:v1.1.6
        ports:
        - containerPort: 80
        # Validación de Salud (Punto 4)
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10