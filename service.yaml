apiVersion: v1
kind: Service
metadata:
  name: api-service
  labels:
    app: hexagonal-api
spec:
  type: NodePort
  selector:
    app: hexagonal-api
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: 8000
      nodePort: 30100
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: NodePort
  selector:
    app: hexagonal-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30200