apiVersion: v1
kind: ConfigMap
metadata:
  name: taller-diego-sre-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  taller-diego-sre.json: |
    {
      "title": "Taller Diego SRE Dashboard",
      "tags": ["sre", "taller-diego"],
      "timezone": "browser",
      "schemaVersion": 38,
      "refresh": "10s",
      "style": "dark",
      "panels": [
        {
          "id": 1,
          "title": "SLI de Disponibilidad de Ventas (99.5%)",
          "type": "gauge",
          "gridPos": { "h": 8, "w": 6, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{handler=~\"/api/v1/ventas.*\", status!~\"5..\"}[5m])) / sum(rate(http_requests_total{handler=~\"/api/v1/ventas.*\"}[5m]))",
              "legendFormat": "Disponibilidad",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "min": 0,
              "max": 1,
              "unit": "percentunit",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "#8b2721", "value": null },
                  { "color": "#1e3a5f", "value": 0.995 }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": { "values": false, "calcs": ["lastNotNull"] },
            "orientation": "auto"
          }
        },
        {
          "id": 2,
          "title": "Presupuesto de Error: Caídas Permitidas (Disp.)",
          "type": "stat",
          "gridPos": { "h": 8, "w": 6, "x": 6, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "2 - sum(increase(http_requests_total{handler=~\"/api/v1/ventas.*\", status=~\"5..\"}[1h]) or vector(0))",
              "legendFormat": "Caídas Restantes",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "#8b2721", "value": null },
                  { "color": "#1e3a5f", "value": 1 }
                ]
              }
            }
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto"
          }
        },
        {
          "id": 3,
          "title": "SLI de Latencia de Ventas (99% <= 100ms)",
          "type": "gauge",
          "gridPos": { "h": 8, "w": 6, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(http_request_duration_seconds_bucket{handler=~\"/api/v1/ventas.*\", le=\"0.1\"}[5m])) / sum(rate(http_request_duration_seconds_count{handler=~\"/api/v1/ventas.*\"}[5m]))",
              "legendFormat": "Latencia OK",
              "refId": "C"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "min": 0,
              "max": 1,
              "unit": "percentunit",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "#8b2721", "value": null },
                  { "color": "#1e3a5f", "value": 0.99 }
                ]
              }
            }
          }
        },
        {
          "id": 4,
          "title": "Presupuesto de Error: Ventas Lentas Permitidas",
          "type": "stat",
          "gridPos": { "h": 8, "w": 6, "x": 18, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "5 - (sum(increase(http_request_duration_seconds_count{handler=~\"/api/v1/ventas.*\"}[1h]) or vector(0)) - sum(increase(http_request_duration_seconds_bucket{handler=~\"/api/v1/ventas.*\", le=\"0.1\"}[1h]) or vector(0)))",
              "legendFormat": "Ventas Lentas Restantes",
              "refId": "D"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "#8b2721", "value": null },
                  { "color": "#1e3a5f", "value": 1 }
                ]
              }
            }
          },
          "options": {
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto"
          }
        },
        {
          "id": 5,
          "title": "Tráfico Histórico y Errores de Dominio",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{handler=~\"/api/v1/ventas.*\"}[5m]))",
              "legendFormat": "Ventas (Req/s)",
              "refId": "E"
            },
            {
              "expr": "sum(rate(http_requests_total{handler=~\"/api/v1/ventas.*\", status=~\"5..\"}[5m]))",
              "legendFormat": "Errores 5xx",
              "refId": "F"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 10 }
            }
          }
        },
        {
          "id": 6,
          "title": "Latencia P99 de Ventas (segundos)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{handler=~\"/api/v1/ventas.*\"}[5m])) by (le))",
              "legendFormat": "P99 Latencia",
              "refId": "G"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{handler=~\"/api/v1/ventas.*\"}[5m])) by (le))",
              "legendFormat": "P95 Latencia",
              "refId": "H"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 10 },
              "unit": "s"
            }
          }
        },
        {
          "id": 7,
          "title": "Pods Activos (Hexagonal API)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "count(kube_pod_info{pod=~\"api-deployment.*\"})",
              "legendFormat": "Pods Running",
              "refId": "I"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 20 },
              "unit": "short"
            }
          }
        }
      ]
    }
